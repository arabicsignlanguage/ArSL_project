name: asl_project
description: "A new Flutter project for Sign Language Interpretation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  shared_preferences: ^2.2.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  camera: ^0.10.5+9
  flutter_vision: ^1.1.4 # العقل الذكي هنا
  url_launcher: ^6.2.2 #مكتبة لجعل رابط اليوتيوب يفتتح
  provider: ^6.1.1
  flutter_tts: ^3.8.3
  translator: ^1.0.0
  intl: ^0.19.0
  audioplayers: ^5.2.1   # 🟢 الصوت
  vibration: ^1.8.3      # 🟢 الاهتزاز
  confetti: ^0.8.0
  image_gallery_saver: ^2.0.3
  screen_protector: ^1.5.1 # 🟢 حماية الشاشة من الالتقاط

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1 # 🟢 إضافة مكتبة الأيقونات هنا

# 🟢 إعدادات أيقونة التطبيق (App Icon)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
    - assets/sounds/
    - assets/images/learning/letters_cropped/
    - assets/images/learning/letters/
    - assets/images/learning/numbers/
    - assets/images/learning/sentences/

  # 🟢 إضافة خط Tajawal هنا
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900